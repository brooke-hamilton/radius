# Radius control plane on Docker Compose.
#
# This runs the Radius control plane (UCP, Applications RP, Dynamic RP, the
# Deployment Engine and — optionally — the Controller) as containers, backed by
# PostgreSQL for state and a small in-Compose k3s cluster that supplies the
# Kubernetes API the components require for secrets and the encryption key.
#
# This uses the published, unmodified Radius images: no source changes are
# needed. It is the containerized equivalent of `make debug-start`.
#
# Quick start:
#   docker compose up -d
#   # then point the rad CLI at http://localhost:9000 (see README.md)
#
# Bring up the optional Controller (Kubernetes-native / GitOps experience):
#   docker compose --profile full up -d

name: radius

# ---------------------------------------------------------------------------
# Shared definitions
# ---------------------------------------------------------------------------

# Wait for both bootstrap jobs to finish before starting any component.
x-bootstrap-deps: &bootstrap-deps
  bootstrap-db:
    condition: service_completed_successfully
  bootstrap-k8s:
    condition: service_completed_successfully

# Radius binaries read their kubeconfig from $HOME/.kube/config (not the
# KUBECONFIG env var), so HOME is set and the shared kubeconfig volume is
# mounted there.
x-radius-env: &radius-env
  HOME: /home/radius

services:
  # -------------------------------------------------------------------------
  # Backing services
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radius_pass}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Single-node Kubernetes API. Not used as a workload target by default; it
  # exists because the control-plane components require a reachable Kubernetes
  # API for secretProvider: kubernetes and the dynamic-rp encryption key.
  k3s:
    image: rancher/k3s:${K3S_VERSION:-v1.33.4-k3s1}
    command: server --tls-san k3s --disable traefik --disable metrics-server --write-kubeconfig-mode 644
    privileged: true
    environment:
      K3S_KUBECONFIG_OUTPUT: /output/kubeconfig.yaml
      K3S_KUBECONFIG_MODE: "644"
    ports:
      - "6443:6443"
    tmpfs:
      - /run
      - /var/run
    volumes:
      - kubeconfig:/output
      - k3s-server:/var/lib/rancher/k3s
    healthcheck:
      test: ["CMD-SHELL", "kubectl get --raw=/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  # -------------------------------------------------------------------------
  # One-shot bootstrap jobs
  # -------------------------------------------------------------------------
  bootstrap-db:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radius_pass}
    entrypoint: ["/bin/sh", "/scripts/bootstrap-db.sh"]
    volumes:
      - ./scripts:/scripts:ro
    restart: "no"

  bootstrap-k8s:
    image: alpine/kubectl:${KUBECTL_VERSION:-1.33.4}
    user: root
    depends_on:
      k3s:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/bootstrap-k8s.sh"]
    volumes:
      - kubeconfig:/work
      - ./scripts:/scripts:ro
      - ../Chart/crds:/crds:ro
    restart: "no"

  # -------------------------------------------------------------------------
  # Radius control plane
  # -------------------------------------------------------------------------
  ucp:
    image: ${REGISTRY:-ghcr.io/radius-project}/ucpd:${TAG:-latest}
    command: ["--config-file=/etc/config/ucp.yaml"]
    depends_on: *bootstrap-deps
    environment:
      <<: *radius-env
    ports:
      - "9000:9000"
    volumes:
      - ./config/ucp.yaml:/etc/config/ucp.yaml:ro
      - kubeconfig:/home/radius/.kube:ro
    restart: unless-stopped

  applications-rp:
    image: ${REGISTRY:-ghcr.io/radius-project}/applications-rp:${TAG:-latest}
    command: ["--config-file=/etc/config/applications-rp.yaml"]
    depends_on:
      <<: *bootstrap-deps
      ucp:
        condition: service_started
    environment:
      <<: *radius-env
      SKIP_ARM: "true"
      K8S_CLUSTER: "true"
    # UCP's baked-in provider manifests route to the Kubernetes service FQDN
    # "applications-rp.radius-system:5443". The alias makes that name resolve to
    # this container, so no custom manifests are needed.
    networks:
      default:
        aliases:
          - applications-rp.radius-system
    volumes:
      - ./config/applications-rp.yaml:/etc/config/applications-rp.yaml:ro
      - kubeconfig:/home/radius/.kube:ro
    restart: unless-stopped

  dynamic-rp:
    image: ${REGISTRY:-ghcr.io/radius-project}/dynamic-rp:${TAG:-latest}
    command: ["--config-file=/etc/config/dynamic-rp.yaml"]
    depends_on:
      <<: *bootstrap-deps
      ucp:
        condition: service_started
    environment:
      <<: *radius-env
    volumes:
      - ./config/dynamic-rp.yaml:/etc/config/dynamic-rp.yaml:ro
      - kubeconfig:/home/radius/.kube:ro
    restart: unless-stopped

  deployment-engine:
    image: ${DE_IMAGE:-ghcr.io/radius-project/deployment-engine:latest}
    # --kubernetes=true enables the Bicep/recipe deployment path that renders
    # Kubernetes resources (matches the Helm deployment). It reaches the cluster
    # via the mounted kubeconfig (KUBECONFIG below).
    command: ["--kubernetes=true"]
    depends_on:
      <<: *bootstrap-deps
      ucp:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # 6443 + the bicep-de.radius-system alias match the address UCP's built-in
      # (self-hosted) manifests use to route Microsoft.Resources deployments.
      ASPNETCORE_URLS: "http://+:6443"
      RADIUSBACKENDURL: "http://ucp:9000/apis/api.ucp.dev/v1alpha3"
      SKIP_ARM: "true"
      ARM_AUTH_METHOD: UCPCredential
      kubernetes: "true"
      # The .NET Kubernetes client honors KUBECONFIG; point it at the shared
      # kubeconfig so recipes can create resources in the k3s cluster.
      KUBECONFIG: /home/radius/.kube/config
    volumes:
      - kubeconfig:/home/radius/.kube:ro
    networks:
      default:
        aliases:
          - bicep-de.radius-system
    restart: unless-stopped

  # Optional: the Kubernetes-native controller (CRD / GitOps experience).
  # Enable with: docker compose --profile full up -d
  controller:
    image: ${REGISTRY:-ghcr.io/radius-project}/controller:${TAG:-latest}
    profiles: ["full"]
    command: ["--config-file=/etc/config/controller.yaml", "--cert-dir="]
    depends_on:
      <<: *bootstrap-deps
      ucp:
        condition: service_started
    environment:
      <<: *radius-env
    volumes:
      - ./config/controller.yaml:/etc/config/controller.yaml:ro
      - kubeconfig:/home/radius/.kube:ro
    restart: unless-stopped

volumes:
  postgres-data:
  k3s-server:
  kubeconfig:
