# Controller configuration for the Docker Compose deployment.
# Adapted from build/configs/controller.yaml. The controller is only needed for
# the Kubernetes-native (GitOps / CRD) experience and runs under the "full"
# Compose profile. It builds a Kubernetes client from the mounted kubeconfig.
environment:
  name: "self-hosted"
  roleLocation: "global"
profilerProvider:
  enabled: false
  port: 6063
metricsProvider:
  enabled: false
  serviceName: "controller"
  prometheus:
    path: "/metrics"
    port: 9093
tracerProvider:
  enabled: false
  serviceName: "controller"
  zipkin:
    url: "http://localhost:9411/api/v2/spans"
server:
  host: "0.0.0.0"
  port: 8083
workerServer:
  port: 7073
ucp:
  kind: direct
  direct:
    endpoint: "http://ucp:9000/apis/api.ucp.dev/v1alpha3"
logging:
  level: "info"
  json: false
